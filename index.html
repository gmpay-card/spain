<!DOCTYPE html>
<html lang="es">
<head>
    <meta name="theme-color" content="#0F0F0F">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta property="og:title" content="GMPay Partnership - Ganar con nosotros">
    <meta property="og:description" content="Presentación para socios. Soluciones de pago globales.">
    <meta property="og:image" content="slide1.jpg">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GMPay Partnership | Soluciones Financieras</title>
    <style>
        body { 
            margin: 0; 
            padding: 0; 
            background-color: #0F0F0F; /* Чуть светлее черного для видимости теней */
            display: flex; 
            flex-direction: column; 
            align-items: center;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            color: #fff;
        }

        .presentation-container {
            width: 95%;
            max-width: 900px;
            padding: 40px 0;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Стильное обрамление слайда */
        .slide {
            width: 100%;
            height: auto;
            display: block;
            margin-bottom: 40px; /* Увеличенное расстояние для акцента на каждом слайде */
            border-radius: 12px; /* Скругление углов */
            border: 1px solid rgba(255, 255, 255, 0.1); /* Тонкая "стеклянная" рамка */
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.6); /* Глубокая тень */
            transition: transform 0.3s ease;
            animation: fadeIn 1s ease-in;
        }

        /* Эффект при наведении (на десктопе) */
        .slide:hover {
            transform: translateY(-5px);
            border-color: rgba(191, 149, 63, 0.4); /* Золотистый отсвет при наведении */
        }

       /* Базовый стиль кнопки (десктоп) */
        .gold-btn {
            display: inline-block;
            padding: 22px 45px;
            margin-bottom: 80px; 
            background: linear-gradient(45deg, #BF953F, #FCF6BA, #B38728, #FBF5B7, #AA771C);
            color: #000; 
            text-decoration: none;
            font-size: 1.1rem;
            font-weight: 800;
            border-radius: 10px;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            transition: all 0.3s ease;
            box-shadow: 0 10px 30px rgba(191, 149, 63, 0.3);
            text-align: center;
            width: 85%;
            max-width: 380px;
        }

        .gold-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 15px 40px rgba(251, 245, 183, 0.5);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* --- НОВЫЕ НАСТРОЙКИ ДЛЯ МОБИЛЬНЫХ --- */
        @media (max-width: 600px) {
            .presentation-container { padding-top: 20px; }
            
            .slide { 
                margin-bottom: 30px; 
                border-radius: 8px; 
            }
            
            .gold-btn { 
                padding: 14px 24px;   /* Компактные отступы */
                font-size: 0.85rem;   /* Элегантный мелкий шрифт */
                width: auto;          /* Кнопка по размеру текста */
                min-width: 220px;     /* Но не слишком узкая */
                max-width: 80%;       /* Чтобы не упиралась в края */
                margin-bottom: 45px;  /* Отступ до следующего слайда */
                letter-spacing: 1.2px;
                border-radius: 8px;   /* Соответствует скруглению слайдов */
            }
        }
    </style>
</head>
<body>

    <div class="presentation-container">
        <img src="slide1.jpg" class="slide" alt="Intro">
        <img src="slide2.jpg" class="slide" alt="Obstáculo">
        <img src="slide3.jpg" class="slide" alt="Producto">
        <img src="slide4.jpg" class="slide" alt="Números">
        <img src="slide5.jpg" class="slide" alt="Resultados">
        <img src="slide6.jpg" class="slide" alt="Cliente Ideal">
        <img src="slide7.jpg" class="slide" alt="Esfuerzo">
        <img src="slide8.jpg" class="slide" alt="Seguridad">
        <img src="slide9.jpg" class="slide" alt="Tranquilidad">
        <img src="slide10.jpg" class="slide" alt="Oficina Digital"> 
        <a href="https://t.me/gmcard_bot?start=97156108035" class="gold-btn">
            Entrar en el sistema
        </a>
        <img src="slide11.jpg" class="slide" alt="Start Today">
        <a href="https://t.me/GMPAY_support2" class="gold-btn">
            Contacto directo en Telegram
        </a>
    </div>

</body>
</html>
